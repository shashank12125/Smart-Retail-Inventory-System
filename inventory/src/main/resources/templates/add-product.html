<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
</head>
<body>

<h2>Add Product</h2>
<form action="/save-product" method="post" th:object="${product}">

    <input type="hidden" th:field="*{id}"/>

    Name: <input type="text" th:field="*{name}" /><br><br>
    Category: <input type="text" th:field="*{category}" /><br><br>
    Price: <input type="number" step="0.01" th:field="*{price}" /><br>><br>
    Quantity: <input type="number" th:field="*{quantity}" /><br><br>

    <button type="submit">Save</button>
</form>

<br>
<a href="/products">View Products</a>
</body>
</html>

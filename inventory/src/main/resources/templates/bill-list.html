<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Bill History</title>
</head>
<body>
<h2>Bill History</h2>
<table border="1">
    <tr>
        <th>Bill ID</th>
        <th>Date</th>
        <th>Total Amount</th>
        <th>View</th>
    </tr>

    <tr th:each="bill : ${bills}">
        <td th:text="${bill.id}"></td>
        <td th:text="${bill.billDate}"></td>
        <td th:text="${bill.totalAmount}"></td>

        <td>
            <a href="@{/bills/{id}(id=${bill.id})}">View</a>
        </td>
    </tr>

</table>

<br>
<a href="/create-bill">Create New Bill</a>

</body>
</html>
